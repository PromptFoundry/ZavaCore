<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Loader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
    }

    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      height: 40px;
    }

    .shape {
      border-radius: 50px;
      animation: shapeAnimation 4s ease-in-out infinite;
      transform-origin: center;
    }

    /* Individual shapes */
    .shape1 {
      width: 24px;
      height: 24px;
      animation-delay: 0s;
    }

    .shape2 {
      width: 30px;
      height: 24px;
      animation-delay: 0.1s;
    }

    .shape3 {
      width: 50px;
      height: 24px;
      animation-delay: 0.2s;
    }

    .shape4 {
      width: 28px;
      height: 28px;
      animation-delay: 0.3s;
    }

    .shape5 {
      width: 60px;
      height: 24px;
      animation-delay: 0.4s;
    }

    .shape6 {
      width: 26px;
      height: 26px;
      animation-delay: 0.5s;
    }

    @keyframes shapeAnimation {
      0% {
        transform: scale(0);
        opacity: 0;
        background: #a855f7;
      }
      10% {
        transform: scale(0.6);
        opacity: 0.8;
        background: #a855f7;
      }
      20% {
        transform: scale(1);
        opacity: 1;
        background: #c026d3;
      }
      30% {
        transform: scale(1.1);
        opacity: 1;
        background: #db2777;
      }
      40% {
        transform: scale(1.15);
        opacity: 1;
        background: #e879a7;
      }
      50% {
        transform: scale(1.1);
        opacity: 1;
        background: #f87171;
      }
      60% {
        transform: scale(1);
        opacity: 0.9;
        background: #fb923c;
      }
      70% {
        transform: scale(0.9);
        opacity: 0.7;
        background: #14b8a6;
      }
      80% {
        transform: scale(0.7);
        opacity: 0.5;
        background: #3b82f6;
      }
      90% {
        transform: scale(0.4);
        opacity: 0.3;
        background: #8b5cf6;
      }
      100% {
        transform: scale(0);
        opacity: 0;
        background: #a855f7;
      }
    }

    /* Alternative color animation using separate property */
    @keyframes colorShift {
      0%, 100% { background: #a855f7; }
      15% { background: #c026d3; }
      30% { background: #db2777; }
      45% { background: #f87171; }
      60% { background: #fb923c; }
      75% { background: #14b8a6; }
      85% { background: #3b82f6; }
      95% { background: #8b5cf6; }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
    <div class="shape shape4"></div>
    <div class="shape shape5"></div>
    <div class="shape shape6"></div>
  </div>
</body>
</html>
