<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect to index.html, encoding the path as a query param
      // so React Router can restore it on load
      var base = '/ZavaCore';
      var path = window.location.pathname.replace(base, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        base + '/?p=' + encodeURIComponent(path + search) + (hash ? '&h=' + encodeURIComponent(hash) : '')
      );
    </script>
  </head>
  <body></body>
</html>
