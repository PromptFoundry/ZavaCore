<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/ZavaCore_logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZavaCore</title>
    <script>
      // Restore path encoded by 404.html redirect
      (function() {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var h = params.get('h') || '';
          params.delete('p');
          params.delete('h');
          var remaining = params.toString();
          var newUrl = '/ZavaCore' + decodeURIComponent(p) + (remaining ? '?' + remaining : '') + decodeURIComponent(h);
          window.history.replaceState(null, '', newUrl);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
